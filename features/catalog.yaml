  - id: similarity-smoke-metrics
    name: Similarity smoke metrics
    module: quality/evaluation
    milestone: m7-quality
  - id: ai-gateway-protocol
    name: LLM gateway protocol and fake responder
    module: core/ai
    milestone: m2-extraction
  - id: ai-audit-model
    name: AI call audit model and privacy filter
    module: core/ai
    milestone: m2-extraction
  - id: ai-report-adapter
    name: LLM report writing adapter
    module: core/ai
    milestone: m6-review
  - id: ai-consultation-protocol
    name: AI consultation protocol and quota tracking
    module: core/ai
    milestone: m6-review
  - id: module-boundary-checks
    name: Module boundary checks
    module: quality/module_checks
    milestone: m7-quality
